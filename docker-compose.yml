services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend Services ──────────────────────────────────────────────────────
  auth:
    build: ./backend/services/auth
    ports:
      - "${AUTH_PORT:-5000}:5000"
    depends_on:
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/auth_db
      - PORT=5000
    dns:
      - 8.8.8.8
      - 8.8.4.4

  notification:
    build: ./backend/services/notification
    ports:
      - "${NOTIFICATION_PORT:-3006}:3006"
    depends_on:
      kafka:
        condition: service_healthy
    env_file: ./.env
    environment:
      - PORT=3006

  patient-management:
    build: ./backend/services/patient-management
    ports:
      - "${PATIENT_PORT:-3001}:3001"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/patient_db
      - PORT=3001
    dns:
      - 8.8.8.8
      - 8.8.4.4

  doctor-management:
    build: ./backend/services/doctor-management
    ports:
      - "${DOCTOR_PORT:-3002}:3002"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/doctor_db
      - PORT=3002
    dns:
      - 8.8.8.8
      - 8.8.4.4

  appointment:
    build: ./backend/services/appointment
    ports:
      - "${APPOINTMENT_PORT:-3003}:3003"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/appointment_db
      - DOCTOR_SERVICE_URL=http://doctor-management:3002
      - PORT=3003
    dns:
      - 8.8.8.8
      - 8.8.4.4

  telemedicine:
    build: ./backend/services/telemedicine
    ports:
      - "${TELEMEDICINE_PORT:-3004}:3004"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/telemedicine_db
      - PORT=3004

  payment:
    build: ./backend/services/payment
    ports:
      - "${PAYMENT_PORT:-3005}:3005"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/payment_db
      - PORT=3005
    dns:
      - 8.8.8.8
      - 8.8.4.4

  ai-symptom-checker:
    build: ./backend/services/ai-symptom-checker
    ports:
      - "${AI_PORT:-3007}:3007"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: ./.env
    environment:
      - MONGO_URI=${MONGO_BASE:-mongodb://mongo:27017}/symptom_db
      - PORT=3007
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_AUTH_SERVICE_URL: http://localhost:${AUTH_PORT:-5000}/api/auth
        NEXT_PUBLIC_PATIENT_SERVICE_URL: http://localhost:${PATIENT_PORT:-3001}/api/patients
        NEXT_PUBLIC_DOCTOR_SERVICE_URL: http://localhost:${DOCTOR_PORT:-3002}/api/doctors
        NEXT_PUBLIC_APPOINTMENT_SERVICE_URL: http://localhost:${APPOINTMENT_PORT:-3003}/api/appointments
        NEXT_PUBLIC_TELEMEDICINE_SERVICE_URL: http://localhost:${TELEMEDICINE_PORT:-3004}/api/sessions
        NEXT_PUBLIC_PAYMENT_SERVICE_URL: http://localhost:${PAYMENT_PORT:-3005}/api/payments
        NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: http://localhost:${NOTIFICATION_PORT:-3006}/api/notify
        NEXT_PUBLIC_SYMPTOM_CHECKER_URL: http://localhost:${AI_PORT:-3007}/api/symptom-checker
        NEXT_PUBLIC_GROQ_KEY: ${NEXT_PUBLIC_GROQ_KEY}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: ./.env
    depends_on:
      - auth
      - patient-management
      - doctor-management
      - appointment
      - payment
      - telemedicine
      - notification
      - ai-symptom-checker

volumes:
  redis-data:
  mongo-data:
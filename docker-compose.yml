version: '3.8'

services:
  # Kafka & Zookeeper for message streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  # Databases
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"

  # Backend Services
  auth:
    build: ./backend/services/auth
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://admin:password@mongo:27017/medsync?authSource=admin
      - JWT_SECRET=medsync_super_secret_jwt_key_2026
      - JWT_EXPIRE=7d
      - PORT=5000

  notification:
    build: ./backend/services/notification
    ports:
      - "3006:3006"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:9092
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM=${TWILIO_FROM}
      - PORT=3006

  patient-management:
    build: ./backend/services/patient-management
    ports:
      - "3001:3001"
    depends_on:
      - kafka
      - mongo
    environment:
      - KAFKA_BROKERS=kafka:9092
      - MONGO_URI=mongodb://admin:password@mongo:27017/patient_db?authSource=admin
      - PORT=3001

  doctor-management:
    build: ./backend/services/doctor-management
    ports:
      - "3002:3002"
    depends_on:
      - kafka
      - mongo
    environment:
      - KAFKA_BROKERS=kafka:9092
      - MONGO_URI=mongodb://admin:password@mongo:27017/doctor_db?authSource=admin
      - PORT=3002

  appointment:
    build: ./backend/services/appointment
    ports:
      - "3003:3003"
    depends_on:
      - kafka
      - mongo
    environment:
      - KAFKA_BROKERS=kafka:9092
      - MONGO_URI=mongodb://admin:password@mongo:27017/appointment_db?authSource=admin
      - DOCTOR_SERVICE_URL=http://doctor-management:3002
      - PORT=3003

  telemedicine:
    build: ./backend/services/telemedicine
    ports:
      - "3004:3004"
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3004

  payment:
    build: ./backend/services/payment
    ports:
      - "3005:3005"
    depends_on:
      - kafka
      - mongo
    environment:
      - KAFKA_BROKERS=kafka:9092
      - MONGO_URI=mongodb://admin:password@mongo:27017/payment_db?authSource=admin
      - PORT=3005

  ai-symptom-checker:
    build: ./backend/services/ai-symptom-checker
    ports:
      - "3007:3007"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:9092
      - PORT=3007

  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - patient-management
      - doctor-management
      - appointment
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:5000

volumes:
  mongo-data:
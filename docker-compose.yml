
services:
  # Kafka & Zookeeper for message streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  # Databases
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Backend Services


  notification:
    build: ./backend/services/notification
    ports:
      - "${NOTIFICATION_PORT:-3006}:3006"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM=${TWILIO_FROM}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - PORT=3006

  patient-management:
    build: ./backend/services/patient-management
    ports:
      - "${PATIENT_PORT:-3001}:3001"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - MONGO_URI=mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_ATLAS_CLUSTER}/patient_db?retryWrites=true&w=majority
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}

  doctor-management:
    build: ./backend/services/doctor-management
    ports:
      - "${DOCTOR_PORT:-3002}:3002"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - MONGO_URI=mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_ATLAS_CLUSTER}/doctor_db?retryWrites=true&w=majority
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET}

  appointment:
    build: ./backend/services/appointment
    ports:
      - "${APPOINTMENT_PORT:-3003}:3003"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - MONGO_URI=mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_ATLAS_CLUSTER}/appointment_db?retryWrites=true&w=majority
      - DOCTOR_SERVICE_URL=http://doctor-management:3002
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET}

  telemedicine:
    build: ./backend/services/telemedicine
    ports:
      - "${TELEMEDICINE_PORT:-3004}:3004"
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - AGORA_APP_ID=${AGORA_APP_ID}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
      - PORT=3004
      - JWT_SECRET=${JWT_SECRET}

  payment:
    build: ./backend/services/payment
    ports:
      - "${PAYMENT_PORT:-3005}:3005"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - MONGO_URI=mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_ATLAS_CLUSTER}/payment_db?retryWrites=true&w=majority
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=3005
      - JWT_SECRET=${JWT_SECRET}

  ai-symptom-checker:
    build: ./backend/services/ai-symptom-checker
    ports:
      - "${AI_PORT:-3007}:3007"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=3007
      - JWT_SECRET=${JWT_SECRET}

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_PATIENT_SERVICE_URL=http://localhost:${PATIENT_PORT:-3001}/api/patients
      - NEXT_PUBLIC_SYMPTOM_CHECKER_URL=http://localhost:${AI_PORT:-3007}/api/symptom-checker
      - NEXT_PUBLIC_DOCTOR_SERVICE_URL=http://localhost:${DOCTOR_PORT:-3002}/api/doctors
      - NEXT_PUBLIC_APPOINTMENT_SERVICE_URL=http://localhost:${APPOINTMENT_PORT:-3003}/api/appointments
      - NEXT_PUBLIC_PAYMENT_SERVICE_URL=http://localhost:${PAYMENT_PORT:-3005}/api/payments
      - NEXT_PUBLIC_TELEMEDICINE_SERVICE_URL=http://localhost:${TELEMEDICINE_PORT:-3004}/api/sessions
    depends_on:
      - patient-management
      - doctor-management
      - appointment
      - payment
      - telemedicine
      - ai-symptom-checker

volumes:
  redis-data:


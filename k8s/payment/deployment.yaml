apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: medsync
  labels:
    app: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: payment:latest
        ports:
        - containerPort: 3005
        env:
        - name: PORT
          value: "3005"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: medsync
  labels:
    app: payment
spec:
  selector:
    app: payment
  ports:
  - port: 3005
    targetPort: 3005
    name: http
  type: ClusterIP
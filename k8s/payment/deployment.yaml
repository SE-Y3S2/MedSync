apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: medsync
  labels:
    app: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: payment:latest
        ports:
        - containerPort: 3005
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/payment_db"
        - name: PORT
          value: "3005"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: medsync
spec:
  selector:
    app: payment
  ports:
  - protocol: TCP
    port: 3005
    targetPort: 3005
  type: ClusterIP

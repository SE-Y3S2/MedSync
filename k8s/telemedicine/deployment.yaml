apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine
  namespace: medsync
  labels:
    app: telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine
  template:
    metadata:
      labels:
        app: telemedicine
    spec:
      containers:
      - name: telemedicine
        image: telemedicine:latest
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine
  namespace: medsync
  labels:
    app: telemedicine
spec:
  selector:
    app: telemedicine
  ports:
  - port: 3004
    targetPort: 3004
    name: http
  type: ClusterIP
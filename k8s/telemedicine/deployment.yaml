apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine
  namespace: medsync
  labels:
    app: telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine
  template:
    metadata:
      labels:
        app: telemedicine
    spec:
      containers:
      - name: telemedicine
        image: telemedicine:latest
        ports:
        - containerPort: 3004
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: PORT
          value: "3004"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine
  namespace: medsync
spec:
  selector:
    app: telemedicine
  ports:
  - protocol: TCP
    port: 3004
    targetPort: 3004
  type: ClusterIP

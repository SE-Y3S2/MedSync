apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: medsync
  labels:
    app: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification
        image: notification:latest
        ports:
        - containerPort: 3006
        env:
        - name: PORT
          value: "3006"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: medsync
  labels:
    app: notification
spec:
  selector:
    app: notification
  ports:
  - port: 3006
    targetPort: 3006
    name: http
  type: ClusterIP
# Kubernetes Secret manifest for MedSync platform secrets.
# IMPORTANT: Replace the base64-encoded placeholder before applying.
# Generate a new value with:
#   echo -n 'your-real-secret' | base64
apiVersion: v1
kind: Secret
metadata:
  name: medsync-secrets
  namespace: medsync
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_STRONG_RANDOM_STRING"
  JWT_EXPIRE: "7d"

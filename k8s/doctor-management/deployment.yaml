apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-management
  namespace: medsync
  labels:
    app: doctor-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-management
  template:
    metadata:
      labels:
        app: doctor-management
    spec:
      containers:
      - name: doctor-management
        image: doctor-management:latest
        ports:
        - containerPort: 3002
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/doctor_db"
        - name: PORT
          value: "3002"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-management
  namespace: medsync
spec:
  selector:
    app: doctor-management
  ports:
  - protocol: TCP
    port: 3002
    targetPort: 3002
  type: ClusterIP

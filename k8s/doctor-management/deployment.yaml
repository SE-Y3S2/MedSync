apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-management
  namespace: medsync
  labels:
    app: doctor-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-management
  template:
    metadata:
      labels:
        app: doctor-management
    spec:
      containers:
      - name: doctor-management
        image: doctor-management:latest
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-management
  namespace: medsync
  labels:
    app: doctor-management
spec:
  selector:
    app: doctor-management
  ports:
  - port: 3002
    targetPort: 3002
    name: http
  type: ClusterIP
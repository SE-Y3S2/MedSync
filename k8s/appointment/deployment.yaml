apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment
  namespace: medsync
  labels:
    app: appointment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment
  template:
    metadata:
      labels:
        app: appointment
    spec:
      containers:
      - name: appointment
        image: appointment:latest
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment
  namespace: medsync
  labels:
    app: appointment
spec:
  selector:
    app: appointment
  ports:
  - port: 3003
    targetPort: 3003
    name: http
  type: ClusterIP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-management
  namespace: medsync
  labels:
    app: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-management
  template:
    metadata:
      labels:
        app: patient-management
    spec:
      containers:
      - name: patient-management
        image: patient-management:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
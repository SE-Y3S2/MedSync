apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-management
  namespace: medsync
  labels:
    app: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-management
  template:
    metadata:
      labels:
        app: patient-management
    spec:
      containers:
      - name: patient-management
        image: patient-management:latest
        ports:
        - containerPort: 3001
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/patient_db"
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-management
  namespace: medsync
spec:
  selector:
    app: patient-management
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
  type: ClusterIP
